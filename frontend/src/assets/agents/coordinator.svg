<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none">
  <defs>
    <radialGradient id="cg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#4488ff" stop-opacity="0.12"/><stop offset="100%" stop-color="#4488ff" stop-opacity="0"/></radialGradient>
    <filter id="gb"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Grid -->
  <g stroke="#4488ff" stroke-width="0.3" opacity="0.07"><line x1="0" y1="40" x2="320" y2="40"/><line x1="0" y1="80" x2="320" y2="80"/><line x1="0" y1="120" x2="320" y2="120"/><line x1="0" y1="160" x2="320" y2="160"/><line x1="0" y1="200" x2="320" y2="200"/><line x1="0" y1="240" x2="320" y2="240"/><line x1="0" y1="280" x2="320" y2="280"/><line x1="40" y1="0" x2="40" y2="320"/><line x1="80" y1="0" x2="80" y2="320"/><line x1="120" y1="0" x2="120" y2="320"/><line x1="160" y1="0" x2="160" y2="320"/><line x1="200" y1="0" x2="200" y2="320"/><line x1="240" y1="0" x2="240" y2="320"/><line x1="280" y1="0" x2="280" y2="320"/></g>
  <!-- Radial glow -->
  <circle cx="160" cy="160" r="140" fill="url(#cg)"/>
  <!-- Concentric rings -->
  <circle cx="160" cy="160" r="140" stroke="#4488ff" stroke-width="0.5" opacity="0.12"/><circle cx="160" cy="160" r="120" stroke="#4488ff" stroke-width="0.6" opacity="0.15"/><circle cx="160" cy="160" r="100" stroke="#4488ff" stroke-width="0.7" opacity="0.18"/><circle cx="160" cy="160" r="80" stroke="#4488ff" stroke-width="0.8" opacity="0.22"/><circle cx="160" cy="160" r="60" stroke="#4488ff" stroke-width="1" opacity="0.26"/><circle cx="160" cy="160" r="40" stroke="#4488ff" stroke-width="1.2" opacity="0.3"/><circle cx="160" cy="160" r="20" stroke="#4488ff" stroke-width="1.4" opacity="0.35"/>
  <!-- Expanding pulse rings -->
  <circle cx="160" cy="160" r="20" fill="none" stroke="#4488ff" stroke-width="1.5"><animate attributeName="r" from="20" to="140" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.5" to="0" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="160" cy="160" r="20" fill="none" stroke="#4488ff" stroke-width="1"><animate attributeName="r" from="20" to="140" dur="4s" begin="1.33s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.4" to="0" dur="4s" begin="1.33s" repeatCount="indefinite"/></circle>
  <circle cx="160" cy="160" r="20" fill="none" stroke="#4488ff" stroke-width="0.7"><animate attributeName="r" from="20" to="140" dur="4s" begin="2.66s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.3" to="0" dur="4s" begin="2.66s" repeatCount="indefinite"/></circle>
  <!-- Rotating outer hexagon -->
  <g style="transform-origin:160px 160px"><animateTransform attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="30s" repeatCount="indefinite"/><polygon points="160,15 279,88 279,232 160,305 41,232 41,88" fill="none" stroke="#4488ff" stroke-width="0.8" opacity="0.18"/></g>
  <!-- Rotating inner hexagon -->
  <g style="transform-origin:160px 160px"><animateTransform attributeName="transform" type="rotate" from="360 160 160" to="0 160 160" dur="20s" repeatCount="indefinite"/><polygon points="160,55 245,108 245,212 160,265 75,212 75,108" fill="none" stroke="#4488ff" stroke-width="0.6" opacity="0.12"/></g>
  <!-- Radar sweep -->
  <g style="transform-origin:160px 160px" filter="url(#gb)"><animateTransform attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="3s" repeatCount="indefinite"/><line x1="160" y1="160" x2="160" y2="20" stroke="#4488ff" stroke-width="2" opacity="0.85"/><path d="M160,160 L160,20 A140,140 0 0,0 95,35 Z" fill="#4488ff" opacity="0.04"/></g>
  <!-- Target blips with trails -->
  <circle cx="210" cy="100" r="4" fill="#4488ff" filter="url(#gb)"><animate attributeName="opacity" values="0;0;0.9;0.9;0.3;0" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="210" cy="100" r="8" fill="none" stroke="#4488ff" stroke-width="0.5" opacity="0"><animate attributeName="opacity" values="0;0;0.4;0;0;0" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="110" cy="190" r="3" fill="#4488ff" filter="url(#gb)"><animate attributeName="opacity" values="0;0;0;0.8;0.8;0.2;0" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="180" cy="210" r="3.5" fill="#33ff33" filter="url(#gb)"><animate attributeName="opacity" values="0;0;0;0;0.7;0.7;0" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="130" cy="120" r="2.5" fill="#ffaa00" filter="url(#gb)"><animate attributeName="opacity" values="0;0.6;0.6;0;0;0" dur="3s" repeatCount="indefinite"/></circle>
  <!-- Crosshair -->
  <line x1="160" y1="148" x2="160" y2="172" stroke="#4488ff" stroke-width="1.5" opacity="0.6"/><line x1="148" y1="160" x2="172" y2="160" stroke="#4488ff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="160" cy="160" r="6" fill="none" stroke="#4488ff" stroke-width="1" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="160" cy="160" r="2.5" fill="#4488ff"><animate attributeName="opacity" values="0.8;0.4;0.8" dur="1.5s" repeatCount="indefinite"/></circle>
  <!-- Orbiting dots -->
  <g style="transform-origin:160px 160px"><animateTransform attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="8s" repeatCount="indefinite"/><circle cx="160" cy="40" r="2" fill="#4488ff" opacity="0.6"/></g>
  <g style="transform-origin:160px 160px"><animateTransform attributeName="transform" type="rotate" from="120 160 160" to="480 160 160" dur="10s" repeatCount="indefinite"/><circle cx="160" cy="60" r="1.5" fill="#4488ff" opacity="0.4"/></g>
  <g style="transform-origin:160px 160px"><animateTransform attributeName="transform" type="rotate" from="240 160 160" to="600 160 160" dur="12s" repeatCount="indefinite"/><circle cx="160" cy="80" r="1.5" fill="#33ff33" opacity="0.4"/></g>
  <!-- Arc segments -->
  <path d="M160,20 A140,140 0 0,1 300,160" fill="none" stroke="#4488ff" stroke-width="0.8" stroke-dasharray="3 8" opacity="0.2"><animate attributeName="stroke-dashoffset" from="200" to="0" dur="5s" repeatCount="indefinite"/></path>
  <path d="M300,160 A140,140 0 0,1 160,300" fill="none" stroke="#4488ff" stroke-width="0.8" stroke-dasharray="5 12" opacity="0.15"><animate attributeName="stroke-dashoffset" from="200" to="0" dur="7s" repeatCount="indefinite"/></path>
  <!-- Corner brackets -->
  <g stroke="#4488ff" stroke-width="1.5" opacity="0.4"><polyline points="8,28 8,8 28,8" fill="none"/><polyline points="292,8 312,8 312,28" fill="none"/><polyline points="312,292 312,312 292,312" fill="none"/><polyline points="28,312 8,312 8,292" fill="none"/></g>
  <!-- Small corner brackets inner -->
  <g stroke="#4488ff" stroke-width="0.8" opacity="0.2"><polyline points="20,50 20,20 50,20" fill="none"/><polyline points="270,20 300,20 300,50" fill="none"/><polyline points="300,270 300,300 270,300" fill="none"/><polyline points="50,300 20,300 20,270" fill="none"/></g>
  <!-- Diagonal scan lines -->
  <g opacity="0.04" stroke="#4488ff" stroke-width="0.5"><line x1="0" y1="80" x2="80" y2="0"/><line x1="0" y1="160" x2="160" y2="0"/><line x1="0" y1="240" x2="240" y2="0"/><line x1="0" y1="320" x2="320" y2="0"/><line x1="80" y1="320" x2="320" y2="80"/><line x1="160" y1="320" x2="320" y2="160"/><line x1="240" y1="320" x2="320" y2="240"/></g>
</svg>