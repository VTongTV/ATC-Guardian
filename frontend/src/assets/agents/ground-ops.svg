<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none">
  <defs>
    <radialGradient id="gg" cx="50%" cy="60%" r="50%"><stop offset="0%" stop-color="#33ff33" stop-opacity="0.08"/><stop offset="100%" stop-color="#33ff33" stop-opacity="0"/></radialGradient>
    <filter id="gg2"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Grid -->
  <g stroke="#33ff33" stroke-width="0.3" opacity="0.06"><line x1="0" y1="40" x2="320" y2="40"/><line x1="0" y1="80" x2="320" y2="80"/><line x1="0" y1="120" x2="320" y2="120"/><line x1="0" y1="160" x2="320" y2="160"/><line x1="0" y1="200" x2="320" y2="200"/><line x1="0" y1="240" x2="320" y2="240"/><line x1="0" y1="280" x2="320" y2="280"/><line x1="40" y1="0" x2="40" y2="320"/><line x1="80" y1="0" x2="80" y2="320"/><line x1="120" y1="0" x2="120" y2="320"/><line x1="160" y1="0" x2="160" y2="320"/><line x1="200" y1="0" x2="200" y2="320"/><line x1="240" y1="0" x2="240" y2="320"/><line x1="280" y1="0" x2="280" y2="320"/></g>
  <!-- Ground glow -->
  <circle cx="160" cy="180" r="140" fill="url(#gg)"/>
  <!-- Runway -->
  <rect x="145" y="40" width="30" height="280" rx="2" fill="none" stroke="#33ff33" stroke-width="1.5" opacity="0.4"/>
  <rect x="148" y="40" width="24" height="280" rx="1" fill="#33ff33" fill-opacity="0.02"/>
  <!-- Runway centerline dashes -->
  <g stroke="#33ff33" stroke-width="1" opacity="0.5"><line x1="160" y1="50" x2="160" y2="70"/><line x1="160" y1="80" x2="160" y2="100"/><line x1="160" y1="110" x2="160" y2="130"/><line x1="160" y1="140" x2="160" y2="160"/><line x1="160" y1="170" x2="160" y2="190"/><line x1="160" y1="200" x2="160" y2="220"/><line x1="160" y1="230" x2="160" y2="250"/><line x1="160" y1="260" x2="160" y2="280"/><line x1="160" y1="290" x2="160" y2="310"/></g>
  <!-- Runway edge lights -->
  <g opacity="0.6"><circle cx="143" cy="50" r="1.5" fill="#33ff33"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite"/></circle><circle cx="177" cy="50" r="1.5" fill="#33ff33"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite"/></circle><circle cx="143" cy="90" r="1.5" fill="#33ff33"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" begin="0.2s" repeatCount="indefinite"/></circle><circle cx="177" cy="90" r="1.5" fill="#33ff33"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" begin="0.2s" repeatCount="indefinite"/></circle><circle cx="143" cy="130" r="1.5" fill="#33ff33"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" begin="0.4s" repeatCount="indefinite"/></circle><circle cx="177" cy="130" r="1.5" fill="#33ff33"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" begin="0.4s" repeatCount="indefinite"/></circle><circle cx="143" cy="170" r="1.5" fill="#33ff33"/><circle cx="177" cy="170" r="1.5" fill="#33ff33"/><circle cx="143" cy="210" r="1.5" fill="#33ff33"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" begin="0.6s" repeatCount="indefinite"/></circle><circle cx="177" cy="210" r="1.5" fill="#33ff33"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" begin="0.6s" repeatCount="indefinite"/></circle><circle cx="143" cy="250" r="1.5" fill="#33ff33"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" begin="0.8s" repeatCount="indefinite"/></circle><circle cx="177" cy="250" r="1.5" fill="#33ff33"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" begin="0.8s" repeatCount="indefinite"/></circle><circle cx="143" cy="290" r="1.5" fill="#33ff33"/><circle cx="177" cy="290" r="1.5" fill="#33ff33"/></g>
  <!-- PAPI approach lights -->
  <g opacity="0.7"><circle cx="140" cy="70" r="2.5" fill="#ff3333"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="1s" repeatCount="indefinite"/></circle><circle cx="136" cy="70" r="2.5" fill="#ff3333"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="1s" begin="0.15s" repeatCount="indefinite"/></circle><circle cx="180" cy="70" r="2.5" fill="#ffffff" opacity="0.5"/><circle cx="184" cy="70" r="2.5" fill="#ffffff" opacity="0.5"/></g>
  <!-- Taxiway -->
  <path d="M175,200 L240,200 L240,220 L200,220" stroke="#33ff33" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4 3"/>
  <path d="M175,200 L240,200 L240,220 L200,220" stroke="#33ff33" stroke-width="0.5" fill="none" opacity="0.15"/>
  <!-- Taxiway lights -->
  <circle cx="190" cy="200" r="1" fill="#33ff33" opacity="0.5"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="210" cy="200" r="1" fill="#33ff33" opacity="0.5"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle>
  <circle cx="230" cy="200" r="1" fill="#33ff33" opacity="0.5"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" begin="1s" repeatCount="indefinite"/></circle>
  <!-- Aircraft on approach -->
  <g style="transform-origin:160px 100px" filter="url(#gg2)"><animateTransform attributeName="transform" type="translate" from="0 -20" to="0 120" dur="8s" repeatCount="indefinite"/><g style="transform-origin:160px 100px"><animateTransform attributeName="transform" type="scale" from="1" to="1.4" dur="8s" repeatCount="indefinite"/><path d="M160,88 L165,96 L180,100 L165,102 L163,110 L160,114 L157,110 L155,102 L140,100 L155,96 Z" fill="none" stroke="#33ff33" stroke-width="1.2" stroke-linejoin="round" opacity="0.7"/></g></g>
  <!-- Ground vehicle -->
  <g opacity="0.5"><rect x="220" y="208" width="12" height="6" rx="1.5" fill="none" stroke="#ffaa00" stroke-width="0.8"/><circle cx="222" cy="215" r="1.5" fill="none" stroke="#ffaa00" stroke-width="0.5"/><circle cx="230" cy="215" r="1.5" fill="none" stroke="#ffaa00" stroke-width="0.5"/><rect x="224" y="210" width="4" height="2" rx="0.5" fill="#ffaa00" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="1s" repeatCount="indefinite"/></rect></g>
  <!-- ILS glide slope indicator -->
  <g opacity="0.3"><path d="M100,160 L130,140" stroke="#33ff33" stroke-width="0.8" stroke-dasharray="2 2"><animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite"/></path><path d="M100,160 L130,180" stroke="#33ff33" stroke-width="0.8" stroke-dasharray="2 2"><animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" begin="0.3s" repeatCount="indefinite"/></path><circle cx="130" cy="140" r="2" fill="#33ff33" opacity="0.5"/><circle cx="130" cy="180" r="2" fill="#33ff33" opacity="0.5"/></g>
  <!-- Compass rose -->
  <g transform="translate(50,50)" opacity="0.25"><circle cx="0" cy="0" r="20" fill="none" stroke="#33ff33" stroke-width="0.6"/><line x1="0" y1="-20" x2="0" y2="-14" stroke="#33ff33" stroke-width="0.8"/><line x1="0" y1="14" x2="0" y2="20" stroke="#33ff33" stroke-width="0.8"/><line x1="-20" y1="0" x2="-14" y2="0" stroke="#33ff33" stroke-width="0.8"/><line x1="14" y1="0" x2="20" y2="0" stroke="#33ff33" stroke-width="0.8"/><g style="transform-origin:0px 0px"><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite"/><line x1="0" y1="0" x2="0" y2="-18" stroke="#33ff33" stroke-width="0.5" opacity="0.6"/></g></g>
  <!-- Wind direction arrow -->
  <g opacity="0.35" transform="translate(270,50)"><path d="M0,20 L0,-15 L-5,-8 M0,-15 L5,-8" fill="none" stroke="#33ccff" stroke-width="1" stroke-linecap="round"><animate attributeName="opacity" values="0.35;0.15;0.35" dur="3s" repeatCount="indefinite"/></path></g>
  <!-- Corner brackets -->
  <g stroke="#33ff33" stroke-width="1.5" opacity="0.35"><polyline points="8,28 8,8 28,8" fill="none"/><polyline points="292,8 312,8 312,28" fill="none"/><polyline points="312,292 312,312 292,312" fill="none"/><polyline points="28,312 8,312 8,292" fill="none"/></g>
  <!-- Radar sweep ground -->
  <circle cx="160" cy="280" r="60" fill="none" stroke="#33ff33" stroke-width="0.4" opacity="0.15"><animate attributeName="r" from="10" to="70" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0;0.2" dur="3s" repeatCount="indefinite"/></circle>
</svg>