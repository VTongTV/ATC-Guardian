<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none">
  <defs>
    <radialGradient id="sg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#aa88ff" stop-opacity="0.1"/><stop offset="100%" stop-color="#aa88ff" stop-opacity="0"/></radialGradient>
    <filter id="sg2"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Grid -->
  <g stroke="#aa88ff" stroke-width="0.3" opacity="0.06"><line x1="0" y1="40" x2="320" y2="40"/><line x1="0" y1="80" x2="320" y2="80"/><line x1="0" y1="120" x2="320" y2="120"/><line x1="0" y1="160" x2="320" y2="160"/><line x1="0" y1="200" x2="320" y2="200"/><line x1="0" y1="240" x2="320" y2="240"/><line x1="0" y1="280" x2="320" y2="280"/><line x1="40" y1="0" x2="40" y2="320"/><line x1="80" y1="0" x2="80" y2="320"/><line x1="120" y1="0" x2="120" y2="320"/><line x1="160" y1="0" x2="160" y2="320"/><line x1="200" y1="0" x2="200" y2="320"/><line x1="240" y1="0" x2="240" y2="320"/><line x1="280" y1="0" x2="280" y2="320"/></g>
  <!-- Radial glow -->
  <circle cx="160" cy="155" r="140" fill="url(#sg)"/>
  <!-- Shield outer -->
  <path d="M160,35 L250,80 L250,175 Q250,240 160,280 Q70,240 70,175 L70,80 Z" fill="none" stroke="#aa88ff" stroke-width="2" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.3;0.5" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M160,45 L240,85 L240,172 Q240,232 160,270 Q80,232 80,172 L80,85 Z" fill="#aa88ff" fill-opacity="0.015"/>
  <!-- Shield inner -->
  <path d="M160,60 L225,95 L225,168 Q225,220 160,255 Q95,220 95,168 L95,95 Z" fill="none" stroke="#aa88ff" stroke-width="0.8" opacity="0.25"/>
  <path d="M160,75 L210,102 L210,162 Q210,205 160,235 Q110,205 110,162 L110,102 Z" fill="none" stroke="#aa88ff" stroke-width="0.5" opacity="0.15"/>
  <!-- Center checkmark -->
  <g filter="url(#sg2)"><path d="M130,155 L150,180 L195,120" fill="none" stroke="#aa88ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"><animate attributeName="opacity" values="0.7;0.4;0.7" dur="2s" repeatCount="indefinite"/></path></g>
  <!-- Checkmark glow pulse -->
  <circle cx="160" cy="150" r="30" fill="none" stroke="#aa88ff" stroke-width="1"><animate attributeName="r" from="25" to="60" dur="2.5s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.25" to="0" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="160" cy="150" r="25" fill="none" stroke="#aa88ff" stroke-width="0.8"><animate attributeName="r" from="25" to="60" dur="2.5s" begin="0.8s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.2" to="0" dur="2.5s" begin="0.8s" repeatCount="indefinite"/></circle>
  <!-- Orbiting inspection dots -->
  <g style="transform-origin:160px 150px"><animateTransform attributeName="transform" type="rotate" from="0 160 150" to="360 160 150" dur="12s" repeatCount="indefinite"/>
    <circle cx="160" cy="65" r="3" fill="#aa88ff" opacity="0.6"/>
    <circle cx="248" cy="110" r="2.5" fill="#aa88ff" opacity="0.5"/>
    <circle cx="248" cy="190" r="2" fill="#aa88ff" opacity="0.4"/>
  </g>
  <g style="transform-origin:160px 150px"><animateTransform attributeName="transform" type="rotate" from="0 160 150" to="-360 160 150" dur="18s" repeatCount="indefinite"/>
    <circle cx="72" cy="120" r="2" fill="#aa88ff" opacity="0.4"/>
    <circle cx="160" cy="240" r="2.5" fill="#aa88ff" opacity="0.45"/>
    <circle cx="85" cy="185" r="1.8" fill="#aa88ff" opacity="0.35"/>
  </g>
  <!-- Scan lines sweeping across shield -->
  <rect x="70" y="100" width="180" height="1" fill="#aa88ff" opacity="0.08"><animate attributeName="y" from="60" to="270" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.08;0" dur="4s" repeatCount="indefinite"/></rect>
  <rect x="70" y="100" width="180" height="0.5" fill="#aa88ff" opacity="0.05"><animate attributeName="y" from="60" to="270" dur="4s" begin="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.05;0" dur="4s" begin="2s" repeatCount="indefinite"/></rect>
  <!-- Checklist lines on left -->
  <g opacity="0.25" stroke="#aa88ff" stroke-width="0.8"><line x1="22" y1="80" x2="52" y2="80"/><line x1="22" y1="100" x2="52" y2="100"/><line x1="22" y1="120" x2="52" y2="120"/><line x1="22" y1="140" x2="52" y2="140"/><line x1="22" y1="160" x2="52" y2="160"/></g>
  <!-- Check marks on left -->
  <g opacity="0.2" stroke="#aa88ff" stroke-width="0.7" stroke-linecap="round"><path d="M26,78 L30,82 L36,74"/><path d="M26,98 L30,102 L36,94"><animate attributeName="opacity" values="0.2;0.05;0.2" dur="2s" begin="0.5s" repeatCount="indefinite"/></path><path d="M26,118 L30,122 L36,114"/><path d="M26,138 L30,142 L36,134"><animate attributeName="opacity" values="0.2;0.05;0.2" dur="2s" begin="1s" repeatCount="indefinite"/></path><path d="M26,158 L30,162 L36,154"><animate attributeName="opacity" values="0.2;0.05;0.2" dur="2s" begin="1.5s" repeatCount="indefinite"/></path></g>
  <!-- Status indicators on right -->
  <g opacity="0.3"><circle cx="275" cy="80" r="3" fill="#33ff33" fill-opacity="0.4" stroke="#33ff33" stroke-width="0.6"/><circle cx="275" cy="100" r="3" fill="#33ff33" fill-opacity="0.4" stroke="#33ff33" stroke-width="0.6"/><circle cx="275" cy="120" r="3" fill="#ffaa00" fill-opacity="0.4" stroke="#ffaa00" stroke-width="0.6"><animate attributeName="fill-opacity" values="0.4;0.1;0.4" dur="1.5s" repeatCount="indefinite"/></circle><circle cx="275" cy="140" r="3" fill="#33ff33" fill-opacity="0.4" stroke="#33ff33" stroke-width="0.6"/><circle cx="275" cy="160" r="3" fill="#33ff33" fill-opacity="0.4" stroke="#33ff33" stroke-width="0.6"/></g>
  <!-- Hex frame accents -->
  <g stroke="#aa88ff" stroke-width="0.5" opacity="0.12" fill="none"><polygon points="160,20 195,40 195,70 160,90 125,70 125,40"/><polygon points="160,230 195,250 195,280 160,300 125,280 125,250"/></g>
  <!-- Corner brackets -->
  <g stroke="#aa88ff" stroke-width="1.5" opacity="0.35"><polyline points="8,28 8,8 28,8" fill="none"/><polyline points="292,8 312,8 312,28" fill="none"/><polyline points="312,292 312,312 292,312" fill="none"/><polyline points="28,312 8,312 8,292" fill="none"/></g>
</svg>