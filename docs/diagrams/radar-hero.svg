<?xml version="1.0" encoding="UTF-8"?>
<!-- ATC Guardian radar hero — animated PPI scope with rotating sweep,
     range rings, target blips, and a CPA conflict pair. Pure SMIL.
     Renders on GitHub via <img> embedding. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-label="ATC Guardian radar scope with rotating sweep and aircraft blips">
  <defs>
    <radialGradient id="scopeGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0a3d22" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#04130a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#020806" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="sweepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dff6b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2dff6b" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="conflictPulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Frame -->
  <rect x="0" y="0" width="800" height="460" fill="#020806"/>
  <rect x="12" y="12" width="776" height="436" rx="10" fill="url(#scopeGlow)" stroke="#1a4a2e" stroke-width="1"/>

  <!-- Scope body -->
  <g transform="translate(230 230)">
    <!-- Range rings -->
    <circle r="190" fill="none" stroke="#1d5a36" stroke-width="1"/>
    <circle r="150" fill="none" stroke="#164428" stroke-width="0.8" stroke-dasharray="3 5"/>
    <circle r="110" fill="none" stroke="#164428" stroke-width="0.8" stroke-dasharray="3 5"/>
    <circle r="70"  fill="none" stroke="#164428" stroke-width="0.8" stroke-dasharray="3 5"/>
    <circle r="30"  fill="none" stroke="#164428" stroke-width="0.8" stroke-dasharray="3 5"/>

    <!-- Cross hairs -->
    <line x1="-200" y1="0" x2="200" y2="0" stroke="#0f3a22" stroke-width="0.8"/>
    <line x1="0" y1="-200" x2="0" y2="200" stroke="#0f3a22" stroke-width="0.8"/>

    <!-- Bearing ticks -->
    <g stroke="#1d5a36" stroke-width="1">
      <line x1="0" y1="-190" x2="0" y2="-200"/>
      <line x1="0" y1="190"  x2="0" y2="200"/>
      <line x1="-190" y1="0" x2="-200" y2="0"/>
      <line x1="190"  y1="0" x2="200"  y2="0"/>
    </g>

    <!-- Center -->
    <circle r="3" fill="#2dff6b"/>
    <circle r="9" fill="none" stroke="#2dff6b" stroke-width="0.6" opacity="0.4"/>

    <!-- Rotating sweep -->
    <g>
      <path d="M 0 0 L 190 0 A 190 190 0 0 0 167.6 -90 Z" fill="url(#sweepGrad)"/>
      <line x1="0" y1="0" x2="190" y2="0" stroke="#2dff6b" stroke-width="1.4" opacity="0.9"/>
      <animateTransform attributeName="transform" type="rotate"
                        from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </g>

    <!-- Aircraft blips (green = nominal) -->
    <g filter="url(#softBlur)">
      <circle cx="-120" cy="-60" r="3.2" fill="#39ff7a">
        <animate attributeName="opacity" values="1;0.35;1" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="80" cy="130" r="3.2" fill="#39ff7a">
        <animate attributeName="opacity" values="1;0.4;1" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-150" cy="100" r="3" fill="#39ff7a">
        <animate attributeName="opacity" values="1;0.4;1" dur="3s" begin="1s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- CPA conflict pair (amber/red, converging) -->
    <g>
      <!-- CPA marker -->
      <circle cx="40" cy="-20" r="6" fill="none" stroke="#ffaa00" stroke-width="1.2">
        <animate attributeName="r" values="6;14;6" dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.1;0.9" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <!-- Aircraft A -->
      <circle cx="-30" cy="-50" r="3.6" fill="#ffcc33"/>
      <line x1="-30" y1="-50" x2="40" y2="-20" stroke="#ffcc33" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5">
        <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.6s" repeatCount="indefinite"/>
      </line>
      <!-- Aircraft B -->
      <circle cx="110" cy="10" r="3.6" fill="#ff5544"/>
      <line x1="110" y1="10" x2="40" y2="-20" stroke="#ff5544" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5">
        <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.6s" begin="0.2s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>

  <!-- Right side: status panel -->
  <g transform="translate(470 60)" font-family="'SF Mono', 'Consolas', monospace" fill="#7ad9a0">
    <text x="0" y="0" font-size="13" letter-spacing="2" fill="#2dff6b" font-weight="700">ATC GUARDIAN</text>
    <text x="0" y="20" font-size="10" fill="#4a8a64" letter-spacing="1.4">AI-ASSISTED · HUMAN-DECIDED</text>

    <!-- Status line -->
    <g transform="translate(0 48)">
      <circle cx="6" cy="-4" r="4" fill="#2dff6b">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <text x="18" y="0" font-size="11" fill="#2dff6b" letter-spacing="1.5">SCENARIO SCN-A · T+024s</text>
    </g>

    <!-- Cascade of agent events -->
    <g font-size="10.5" letter-spacing="0.4">
      <g transform="translate(0 80)">
        <rect x="-2" y="-11" width="270" height="16" rx="2" fill="#0e2e1c" opacity="0.5"/>
        <text x="6" y="0" fill="#ffaa00">! conflict-detector  UAL123 ⇄ DAL456  CPA 2.4nm / 92s</text>
      </g>
      <g transform="translate(0 104)">
        <rect x="-2" y="-11" width="270" height="16" rx="2" fill="#0e2e1c" opacity="0.5"/>
        <text x="6" y="0" fill="#aa33ff">@safety-reviewer  verdict: MODIFY → vector 090</text>
      </g>
      <g transform="translate(0 128)">
        <rect x="-2" y="-11" width="270" height="16" rx="2" fill="#0e2e1c" opacity="0.5"/>
        <text x="6" y="0" fill="#4488ff">@coordinator  pending decision queued</text>
      </g>
      <g transform="translate(0 152)">
        <rect x="-2" y="-11" width="270" height="16" rx="2" fill="#1a0f2e" opacity="0.6"/>
        <text x="6" y="0" fill="#2dff6b" font-weight="700">▶ CONTROLLER APPROVED  (human-on-the-loop)</text>
      </g>
    </g>

    <!-- Agent chips -->
    <g transform="translate(0 196)" font-size="9.5">
      <g><rect x="0" y="0" width="50" height="16" rx="3" fill="#0e1a2e" stroke="#4488ff"/><text x="25" y="11" text-anchor="middle" fill="#4488ff">LG</text></g>
      <g><rect x="56" y="0" width="50" height="16" rx="3" fill="#2e1a0e" stroke="#ffaa00"/><text x="81" y="11" text-anchor="middle" fill="#ffaa00">PAI</text></g>
      <g><rect x="112" y="0" width="50" height="16" rx="3" fill="#0e2e2e" stroke="#33ccff"/><text x="137" y="11" text-anchor="middle" fill="#33ccff">CREW</text></g>
      <g><rect x="168" y="0" width="50" height="16" rx="3" fill="#1a0e2e" stroke="#aa33ff"/><text x="193" y="11" text-anchor="middle" fill="#aa33ff">PAI</text></g>
      <text x="226" y="11" fill="#4a8a64">3 frameworks · 6 agents</text>
    </g>

    <!-- Audit footer -->
    <g transform="translate(0 250)" font-size="9" fill="#3a7a54">
      <rect x="-2" y="-12" width="280" height="18" rx="2" fill="none" stroke="#123a23"/>
      <text x="6" y="0">structured events: thought · tool_call · tool_result · verdict</text>
    </g>
  </g>
</svg>
